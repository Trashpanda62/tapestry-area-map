<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explore the Area — Tapestry Acres</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --green:#4b6b3c; --green2:#6b8e4e; --cream:#f7f4ec; --ink:#33301f; --mut:#6f6a55;
    --brown:#8a6a44; --blue:#3f7fa6; --plum:#7b5d77; --line:#e3ddcd; --home:#c0492f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;color:var(--ink);background:var(--cream);}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 26px;}
  .head{text-align:center;margin-bottom:14px;}
  .head h2{font-size:clamp(22px,3.4vw,30px);margin:0 0 4px;color:var(--green);letter-spacing:.3px;}
  .head p{margin:0;color:var(--mut);font-size:15px;font-style:italic;}
  .panel{display:grid;grid-template-columns:1fr 280px;gap:16px;}
  @media(max-width:760px){.panel{grid-template-columns:1fr;}}
  #map{height:500px;border-radius:14px;border:1px solid var(--line);
       box-shadow:0 6px 20px -12px rgba(0,0,0,.35);}
  @media(max-width:760px){#map{height:320px;}}
  .side{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;
        box-shadow:0 6px 20px -14px rgba(0,0,0,.3);max-height:500px;overflow:auto;}
  /* keep the sidebar a bounded, scrollable card on phones so the whole widget
     stays a predictable height when embedded in an iframe (e.g. the Wix Info page) */
  @media(max-width:760px){.side{max-height:300px;}}
  .side h3{margin:0 0 10px;font-size:15px;color:var(--green);}
  .hint{margin:0 0 8px;font-size:11.5px;color:var(--mut);font-style:italic;font-family:Arial,sans-serif;}
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;font-family:Arial,sans-serif;}
  .lg{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--ink);cursor:pointer;
      background:#fff;border:1px solid var(--line);border-radius:14px;padding:3px 9px;line-height:1.4;
      transition:opacity .12s,background .12s,border-color .12s;}
  .lg:hover{border-color:var(--green2);background:var(--cream);}
  .lg.off{opacity:.4;}
  .lg-all{font-weight:700;color:var(--green);}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block;border:2px solid #fff;
       box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .grp{font-family:Arial,sans-serif;font-weight:700;font-size:12px;color:var(--green);
       margin:12px 0 2px;padding-top:8px;border-top:2px solid var(--line);}
  .grp:first-child{border-top:0;padding-top:0;margin-top:0;}
  .item{padding:9px 4px;border-top:1px solid var(--line);cursor:pointer;font-family:Arial,sans-serif;}
  .item:first-of-type{border-top:0;}
  .item:hover{background:var(--cream);}
  .item .nm{font-weight:700;font-size:13.5px;color:var(--ink);}
  .item .meta{font-size:12px;color:var(--mut);margin-top:1px;}
  .pin{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50% 50% 50% 0;
       transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4);font-size:14px;}
  .pin span{transform:rotate(45deg);}
  .pop{font-family:Arial,sans-serif;max-width:230px;}
  .pop .pi{display:block;width:100%;height:120px;object-fit:cover;border-radius:8px;margin:0 0 7px;
           background:var(--cream);}
  .pop .pn{font-weight:700;font-size:14px;color:var(--green);}
  /* pinned "directions home" card at the top of the sidebar */
  .pinned{background:#fbf6e9;border:1px solid #e6d9b3;border-left:4px solid var(--home);
          border-radius:12px;padding:11px 13px;margin-bottom:12px;font-family:Arial,sans-serif;}
  .pinned .pn-t{font-weight:800;font-size:13.5px;color:var(--home);cursor:pointer;}
  .pinned .pn-d{font-size:11.5px;color:var(--mut);margin:4px 0 9px;line-height:1.4;}
  .pinned .pn-b{display:inline-block;background:var(--home);color:#fff;font-size:12.5px;font-weight:700;
                text-decoration:none;border-radius:9px;padding:7px 12px;}
  .pinned .pn-b:hover{filter:brightness(1.08);}
  .pop .pc{display:inline-block;font-size:10.5px;color:#fff;border-radius:10px;padding:1px 8px;margin:4px 0;}
  .pop .pd{font-size:12.5px;color:var(--ink);margin:3px 0 6px;line-height:1.35;}
  .pop a{font-size:12.5px;font-weight:700;color:var(--blue);text-decoration:none;}
  .leaflet-popup-content{margin:11px 13px;}
  .credit{margin:12px 2px 0;font-size:10.5px;color:var(--mut);font-family:Arial,sans-serif;
          font-style:italic;text-align:center;border-top:1px solid var(--line);padding-top:8px;}
</style>
</head>

        <button class="lg" data-cat="history"><i class="dot" style="background:var(--brown)"></i>History</button>
        <button class="lg" data-cat="food"><i class="dot" style="background:#d4803a"></i>Food</button>
        <button class="lg" data-cat="fun"><i class="dot" style="background:#c2557a"></i>Family fun</button>
        <button class="lg" data-cat="shop"><i class="dot" style="background:#b8923a"></i>Shops</button>
        <button class="lg" data-cat="town"><i class="dot" style="background:var(--plum)"></i>Town</button>
        <button class="lg lg-all" data-cat="all">Show all</button>
      </div>
      <div id="list"></div>
      <p class="credit">📷 Photos: Wikimedia Commons &amp; the venues’ own websites</p>
    </div>
  </div>
</div>

     q:'Downtown Monterey, TN',
     d:'Cumberland Plateau railroad town — historic depot, the Standing Stone monument, cafés & antiques; gateway to Bee Rock, Whittaker Falls & Muddy Pond.'}
  ];

  var map = L.map('map', {scrollWheelZoom:true}).setView([36.46,-85.30], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:18
  }).addTo(map);

  function pinIcon(p){
    return L.divIcon({className:'', html:
      '<div class="pin" style="background:'+CAT[p.cat].c+'"><span>'+p.icon+'</span></div>',
      iconSize:[30,30], iconAnchor:[15,28], popupAnchor:[0,-26]});
  }
  // RV-safe route TO the farm — forces the TN-294 / Old Stover Rd approach and
  // avoids the steep, posted-no-truck Jaybird Rd that the default GPS route takes.
  var SAFE_DIR = 'https://www.google.com/maps/dir/?api=1&destination=396+Taylor+Crossroads+Rd,+Monroe,+TN+38573&waypoints=Old+Stover+Rd,+Monroe,+TN';
  function dirUrl(p){
    // Named businesses carry a text query so Google geocodes the exact storefront
    // even though the pin is placed approximately; everything else routes to coords.
    var dest = p.q ? encodeURIComponent(p.q) : (p.at[0]+','+p.at[1]);
    return 'https://www.google.com/maps/dir/?api=1&origin=Tapestry+Acres,+Monroe,+TN&destination='+dest;
  }
  function popHTML(p){
    var chip = p.cat==='home' ? '' :
      '<span class="pc" style="background:'+CAT[p.cat].c+'">'+(p.mins||'')+'</span><br>';
    var img = p.img ? '<img class="pi" src="'+p.img+'" alt="'+p.n+'" loading="lazy">' : '';
    var link = p.cat==='home'
      ? '<a href="'+SAFE_DIR+'" target="_blank" rel="noopener">🚐 RV-safe directions to the farm →</a>'
      : '<a href="'+dirUrl(p)+'" target="_blank" rel="noopener">Get directions →</a>';
    return '<div class="pop">'+img+'<div class="pn">'+p.n+'</div>'+chip+
           '<div class="pd">'+p.d+'</div>'+link+'</div>';
  }

  var CATLABEL = {water:'🌊 Lake & water', park:'🌲 Parks & nature',
                  history:'🏛️ History & culture', food:'🍽️ Food & dining',
                  fun:'🎡 Family fun', shop:'🛍️ Shops & markets', town:'🏘️ Towns'};
  var markers=[], bounds=[], byCat={};
  PLACES.forEach(function(p){
    var m = L.marker(p.at, {icon:pinIcon(p)}).addTo(map).bindPopup(popHTML(p));
    p._m=m; markers.push(m); bounds.push(p.at);
    if(p.cat!=='home'){ (byCat[p.cat]=byCat[p.cat]||[]).push(p); }
  });
  var list=document.getElementById('list');
  // Pinned at the very top: RV-safe directions back to the farm.
  var pin=document.createElement('div'); pin.className='pinned';
  pin.innerHTML='<div class="pn-t">📍 Directions to Tapestry Acres</div>'+
    '<div class="pn-d">RVs &amp; large rigs: take the safe TN-294 / Old Stover Rd route — <b>not</b> the steep Jaybird Rd the GPS picks.</div>'+
    '<a class="pn-b" href="'+SAFE_DIR+'" target="_blank" rel="noopener">🚐 Get RV-safe directions →</a>';
  pin.querySelector('.pn-t').onclick=function(){ map.setView(HOME,13); PLACES[0]._m.openPopup(); };
  list.appendChild(pin);
  var CATS=['water','park','history','food','fun','shop','town'];
  var grpEl={};
  CATS.forEach(function(cat){
    if(!byCat[cat]) return;
    var h=document.createElement('div'); h.className='grp'; h.dataset.cat=cat; h.textContent=CATLABEL[cat];
    list.appendChild(h); grpEl[cat]=h;
    byCat[cat].forEach(function(p){
      var el=document.createElement('div'); el.className='item'; el.dataset.cat=cat;
      el.innerHTML='<div class="nm">'+p.icon+' '+p.n+'</div><div class="meta">'+p.mins+'</div>';
      el.onclick=function(){ map.setView(p.at,12); p._m.openPopup(); };
      list.appendChild(el);
    });
  });

  // ── category filtering (legend chips) ──
  var active={}; CATS.forEach(function(c){active[c]=true;});
  function applyFilter(){
    CATS.forEach(function(cat){
      var on=active[cat];
      (byCat[cat]||[]).forEach(function(p){
        if(on){ if(!map.hasLayer(p._m)) p._m.addTo(map); }
        else  { if(map.hasLayer(p._m)) map.removeLayer(p._m); }
      });
      if(grpEl[cat]) grpEl[cat].style.display=on?'':'none';
    });
    list.querySelectorAll('.item').forEach(function(el){
      el.style.display=active[el.dataset.cat]?'':'none';
    });
    document.querySelectorAll('.lg[data-cat]').forEach(function(b){
      var c=b.dataset.cat;
      if(c==='all') return;
      b.classList.toggle('off', !active[c]);
    });
    // re-fit to whatever is showing (home always counts)
    var b=[HOME];
    CATS.forEach(function(cat){ if(active[cat]) (byCat[cat]||[]).forEach(function(p){b.push(p.at);}); });
    if(b.length>1) map.fitBounds(b,{padding:[30,30],maxZoom:11});
  }
  document.getElementById('legend').addEventListener('click',function(e){
    var btn=e.target.closest('.lg'); if(!btn) return;
    var cat=btn.dataset.cat;
    var isolated = CATS.every(function(c){ return c===cat ? active[c] : !active[c]; });
    if(cat==='all' || isolated){
      // "Show all", or tapping the already-isolated category → reset to everything
      CATS.forEach(function(c){active[c]=true;});
    } else {
      // isolate to just this category
      CATS.forEach(function(c){active[c]=(c===cat);});
    }
    applyFilter();
  });
  // Re-fit after the (often lazy-loaded / late-sized) iframe settles, so the map
  // always opens on the full regional view instead of over-zoomed.
  function fitAll(){ map.invalidateSize(); map.fitBounds(bounds, {padding:[30,30], maxZoom:11}); }
  fitAll();
  markers[0].openPopup();
  setTimeout(fitAll, 400);
  setTimeout(fitAll, 1200);
  window.addEventListener('load', fitAll);
  window.addEventListener('resize', fitAll);
</script>
</body>
</html>
